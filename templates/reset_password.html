<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Neuraivex Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <div class="login-glow"></div>
  <div class="login-page">
    <div class="login-card card-accent">
      <div style="text-align:center; margin-bottom:28px;">
        <a href="{{ url_for('auth.login') }}" class="logo" style="justify-content:center; margin-bottom:20px; display:flex;">
          NEURAIVE<span class="logo-x-wrap"><span class="logo-x">X</span><span class="logo-node"></span></span>
        </a>
        <p style="font-size:13px; color:var(--text-muted);">Set New Password</p>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div style="margin-bottom:14px; padding:10px 14px; border-radius:8px; font-size:12px; font-family:'Space Grotesk',sans-serif;
            {% if category == 'error' %}background:rgba(240,88,88,0.1); border:1px solid rgba(240,88,88,0.25); color:var(--danger);
            {% else %}background:rgba(45,212,160,0.08); border:1px solid rgba(45,212,160,0.2); color:var(--success);{% endif %}">
            {{ message }}
          </div>
        {% endfor %}
      {% endwith %}

      <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
        <div class="form-group">
          <label class="form-label">New Password</label>
          <input class="form-input" type="password" name="password" placeholder="Min. 8 characters" required autofocus />
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input class="form-input" type="password" name="confirm_password" placeholder="Re-enter password" required />
        </div>
        <button type="submit" class="btn-primary" style="width:100%; text-align:center; padding:13px;">Update Password →</button>
      </form>

      <div style="text-align:center; margin-top:18px;">
        <a href="{{ url_for('auth.login') }}" style="font-size:12px; color:var(--text-muted); text-decoration:none;">← Back to Sign In</a>
      </div>
    </div>
  </div>
</body>
</html>
