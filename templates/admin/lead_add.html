{% extends 'base.html' %}
{% block title %}Add Lead — Admin{% endblock %}

{% block content %}
<div class="page-header">
  <div class="label" style="margin-bottom:8px;">Admin Panel</div>
  <h1 class="page-title">Add Lead</h1>
  <p class="page-subtitle">Manually add a lead for a client.</p>
</div>

<div class="card card-accent" style="max-width:600px;">
  <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

    <div class="form-group">
      <label class="form-label">Client</label>
      <select class="form-input" name="client_id" required>
        <option value="">Select client...</option>
        {% for client in clients %}
        <option value="{{ client.id }}" {% if request.args.get('client_id')|int == client.id %}selected{% endif %}>{{ client.name }} — {{ client.company or client.email }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Lead Name</label>
      <input class="form-input" type="text" name="name" placeholder="Full name" required />
    </div>

    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" type="email" name="email" placeholder="lead@company.com" />
    </div>

    <div class="form-group">
      <label class="form-label">Phone</label>
      <input class="form-input" type="tel" name="phone" placeholder="(555) 000-0000" />
    </div>

    <div class="form-group">
      <label class="form-label">Source</label>
      <input class="form-input" type="text" name="source" placeholder="e.g. Contact Form, LinkedIn, Referral..." />
    </div>

    <div class="form-group">
      <label class="form-label">Status</label>
      <select class="form-input" name="status">
        <option value="new">New</option>
        <option value="contacted">Contacted</option>
        <option value="converted">Converted</option>
        <option value="no_response">No Response</option>
      </select>
    </div>

    <div style="display:flex; gap:12px; margin-top:8px;">
      <button type="submit" class="btn-primary">Add Lead</button>
      <a href="{{ url_for('admin.clients') }}" class="btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
