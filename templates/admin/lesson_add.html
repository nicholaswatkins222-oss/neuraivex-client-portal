{% extends 'base.html' %}
{% block title %}Add Lesson — Admin{% endblock %}

{% block content %}
<div class="page-header">
  <div class="label" style="margin-bottom:8px;">Admin Panel — {{ course.title }}</div>
  <h1 class="page-title">Add Lesson</h1>
</div>

<div class="card card-accent" style="max-width:640px;">
  <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

    <div class="form-group">
      <label class="form-label">Title</label>
      <input class="form-input" type="text" name="title" maxlength="255" placeholder="Lesson 1: Setting Up Your First Automation" required />
    </div>

    <div class="form-group">
      <label class="form-label">Description (optional)</label>
      <textarea class="form-input" name="description" rows="2" placeholder="What this lesson covers..." style="min-height:60px;"></textarea>
    </div>

    <div class="form-group">
      <label class="form-label">Video URL (optional)</label>
      <input class="form-input" type="url" name="video_url" maxlength="500" placeholder="https://www.youtube.com/embed/..." />
      <div style="font-size:11px; color:var(--text-muted); margin-top:4px;">Use the embed URL (YouTube: /embed/VIDEO_ID, Vimeo: /video/VIDEO_ID).</div>
    </div>

    <div class="form-group">
      <label class="form-label">Written Content (optional)</label>
      <textarea class="form-input" name="content" rows="8" maxlength="20000" placeholder="Notes, steps, or supplementary text for this lesson..." style="min-height:160px;"></textarea>
      <div style="font-size:11px; color:var(--text-muted); margin-top:4px;">Plain text only. Max 20,000 characters.</div>
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
      <div class="form-group">
        <label class="form-label">Order Index</label>
        <input class="form-input" type="number" name="order_index" value="0" min="0" />
      </div>
      <div class="form-group">
        <label class="form-label">Duration (minutes, optional)</label>
        <input class="form-input" type="number" name="duration_minutes" min="1" placeholder="10" />
      </div>
    </div>

    <div style="display:flex; gap:12px; margin-top:8px;">
      <button type="submit" class="btn-primary">Add Lesson →</button>
      <a href="{{ url_for('admin_courses.course_edit', course_id=course.id) }}" class="btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
