{% extends 'base.html' %}
{% block title %}Add Invoice — Admin{% endblock %}

{% block content %}
<div class="page-header">
  <div class="label" style="margin-bottom:8px;">Admin Panel</div>
  <h1 class="page-title">Add Invoice</h1>
  <p class="page-subtitle">Create a new invoice for a client.</p>
</div>

<div class="card card-accent" style="max-width:600px;">
  <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

    <div class="form-group">
      <label class="form-label">Client</label>
      <select class="form-input" name="client_id" required>
        <option value="">Select client...</option>
        {% for client in clients %}
        <option value="{{ client.id }}" {% if request.args.get('client_id')|int == client.id %}selected{% endif %}>{{ client.name }} — {{ client.company or client.email }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Invoice Number</label>
      <input class="form-input" type="text" name="invoice_number" placeholder="e.g. INV-004" required />
    </div>

    <div class="form-group">
      <label class="form-label">Description</label>
      <input class="form-input" type="text" name="description" placeholder="e.g. Build Phase — Website + Automation" required />
    </div>

    <div class="form-group">
      <label class="form-label">Amount ($)</label>
      <input class="form-input" type="number" name="amount" step="0.01" min="0" placeholder="1800.00" required />
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
      <div class="form-group">
        <label class="form-label">Invoice Date</label>
        <input class="form-input" type="date" name="date" required />
      </div>
      <div class="form-group">
        <label class="form-label">Due Date</label>
        <input class="form-input" type="date" name="due_date" required />
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Status</label>
      <select class="form-input" name="status">
        <option value="unpaid">Unpaid</option>
        <option value="paid">Paid</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">PDF URL (optional)</label>
      <input class="form-input" type="url" name="pdf_url" placeholder="https://..." />
    </div>

    <div style="display:flex; gap:12px; margin-top:8px;">
      <button type="submit" class="btn-primary">Add Invoice</button>
      <a href="{{ url_for('admin.clients') }}" class="btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
