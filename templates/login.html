<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Neuraivex Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <div class="login-glow"></div>
  <div class="login-page">
    <div class="login-card card-accent">
      <div style="text-align:center; margin-bottom:28px;">
        <a href="#" class="logo" style="justify-content:center; margin-bottom:20px; display:flex;">
          NEURAIVE<span class="logo-x-wrap"><span class="logo-x">X</span><span class="logo-node"></span></span>
        </a>
        <p style="font-size:13px; color:var(--text-muted);">Client Portal</p>
      </div>

      <div class="demo-creds">
        <div style="font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--accent-blue); margin-bottom:8px; font-weight:600;">Demo Credentials</div>
        <div class="cred-row"><span class="cred-key">Client email</span><span class="cred-val">jordan@apexmarketing.co</span></div>
        <div class="cred-row"><span class="cred-key">Password</span><span class="cred-val">demo123</span></div>
        <div style="margin-top:8px; padding-top:8px; border-top:1px solid rgba(56,196,240,0.1);">
          <div class="cred-row"><span class="cred-key">Admin email</span><span class="cred-val">admin@neuraivex.com</span></div>
          <div class="cred-row"><span class="cred-key">Password</span><span class="cred-val">admin123</span></div>
        </div>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div style="margin-bottom:14px; padding:10px 14px; border-radius:8px; font-size:12px; font-family:'Space Grotesk',sans-serif;
            {% if category == 'error' %}background:rgba(240,88,88,0.1); border:1px solid rgba(240,88,88,0.25); color:var(--danger);
            {% else %}background:rgba(45,212,160,0.08); border:1px solid rgba(45,212,160,0.2); color:var(--success);{% endif %}">
            {{ message }}
          </div>
        {% endfor %}
      {% endwith %}

      <form method="POST" action="{{ url_for('auth.login') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" type="email" name="email" placeholder="you@company.com" required />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" type="password" name="password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn-primary" style="width:100%; text-align:center; padding:13px;">Sign In →</button>
      </form>
    </div>
  </div>
</body>
</html>
